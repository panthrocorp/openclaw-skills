repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: check-added-large-files
        args:
          - '--maxkb=2048'
          - '--enforce-all'
      - id: check-case-conflict
      - id: check-json
      - id: check-yaml
      - id: detect-aws-credentials
        args:
          - '--allow-missing-credentials'
      - id: detect-private-key
      - id: trailing-whitespace
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=./.config/.yamllint.yaml]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.config/.secrets.baseline']
        exclude: .config/.secrets.baseline

  - repo: local
    hooks:
      - id: no-push-to-main
        name: prevent direct push to main
        entry: >-
          bash -c 'branch=$(git symbolic-ref --short HEAD 2>/dev/null);
          [ "$branch" != "main" ] && [ "$branch" != "master" ]'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'for dir in */; do [ -f "$dir/go.mod" ] && (cd "$dir" && golangci-lint run); done'
        language: system
        types: [go]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ['--config=.gitleaks.toml']
