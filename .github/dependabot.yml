version: 2

updates:
  - package-ecosystem: gomod
    directory: /google-workspace
    schedule:
      interval: weekly
    commit-message:
      prefix: "fix"
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "fix"
    labels:
      - dependencies
    open-pull-requests-limit: 5
